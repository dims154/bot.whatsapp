<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - WhatsApp Bot Dashboard</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>📱 WhatsApp Bot</h1>
                <p>Buat Akun Baru</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Nama Lengkap</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Konfirmasi Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">👤 Buat Akun</button>
            </form>

            <div class="auth-divider">atau</div>

            <a href="login.html" class="btn btn-secondary btn-block">🔐 Login ke Akun Existing</a>

            <p class="auth-footer">
                Dengan membuat akun, Anda setuju dengan syarat & ketentuan kami
            </p>
        </div>

        <div class="auth-info">
            <h2>✨ Keuntungan Member</h2>
            <ul>
                <li>🎯 Manage Bot Unlimited</li>
                <li>💳 Flexible Payment Plans</li>
                <li>👥 Invite Team Members</li>
                <li>🔒 Secure & Encrypted</li>
                <li>⏰ 24/7 Support</li>
                <li>📱 Mobile Friendly</li>
            </ul>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = 'http://localhost:3000/api'

        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast')
            toast.textContent = message
            toast.className = `toast show ${type}`
            setTimeout(() => toast.classList.remove('show'), 3000)
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            
            const name = document.getElementById('name').value
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const confirmPassword = document.getElementById('confirmPassword').value

            if (password !== confirmPassword) {
                showToast('Password tidak cocok', 'error')
                return
            }

            if (password.length < 6) {
                showToast('Password minimal 6 karakter', 'error')
                return
            }

            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                })

                const data = await res.json()

                if (res.ok) {
                    localStorage.setItem('token', data.token)
                    localStorage.setItem('user', JSON.stringify(data.user))
                    showToast('Akun berhasil dibuat, mengalihkan...', 'success')
                    setTimeout(() => window.location.href = '/dashboard.html', 1500)
                } else {
                    showToast(data.error || 'Registrasi gagal', 'error')
                }
            } catch (error) {
                console.error('Error:', error)
                showToast('Gagal terhubung ke server', 'error')
            }
        })
    </script>
</body>
</html>
